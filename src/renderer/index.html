<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f0d14" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ackem" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/ackem-512.png" />
    <title>Ackem</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0f0d14;
      }

      #root {
        height: 100%;
        overflow: hidden;
      }

      #ackem-boot-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #0f0d14;
        transition: opacity 0.42s ease, visibility 0.42s ease;
      }

      #ackem-boot-splash.ackem-boot-splash--out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #root {
        min-height: 100%;
        background: #0f0d14;
      }

      html.ackem-booting body {
        background: #0f0d14 !important;
      }
    </style>
  </head>
  <body class="bg-surface text-ink antialiased">
    <div id="ackem-boot-splash" aria-live="polite" aria-busy="true"></div>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator && /^https?:$/.test(window.location.protocol)) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {})
        })
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
